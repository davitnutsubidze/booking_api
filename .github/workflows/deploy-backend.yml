name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BookingSystem.API/BookingSystem.API.csproj

      - name: Build
        run: dotnet build BookingSystem.API/BookingSystem.API.csproj --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish BookingSystem.API/BookingSystem.API.csproj -c Release -o ./publish --no-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          HOST="$(echo '${{ secrets.EC2_HOST }}' | tr -d '[:space:]')"

          if [ -z "$HOST" ]; then
            echo "EC2_HOST is empty"
            exit 1
          fi

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Test SSH
        run: |
          HOST="$(echo '${{ secrets.EC2_HOST }}' | tr -d '[:space:]')"
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${{ secrets.EC2_USER }}@"$HOST" "echo SSH OK"

      - name: Copy files to EC2
        run: |
          HOST="$(echo '${{ secrets.EC2_HOST }}' | tr -d '[:space:]')"
          scp -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no -r ./publish/* ${{ secrets.EC2_USER }}@"$HOST":/var/www/booking-api/

      - name: Restart API
        run: |
          HOST="$(echo '${{ secrets.EC2_HOST }}' | tr -d '[:space:]')"
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@"$HOST" << 'EOF'
            sudo systemctl restart booking-api
            sudo systemctl status booking-api --no-pager
          EOF